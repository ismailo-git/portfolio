<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta http-equiv="X-UA-Compatible" content="IE=edge">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Document</title>
	<link rel="stylesheet" href="https://unpkg.com/aos@next/dist/aos.css" />
	<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.1.1/css/all.min.css" integrity="sha512-KfkfwYDsLkIlwQp6LFnl8zNdLGxu9YAA1QvwINks4PhcElQSvqcyVLLD9aMhXd13uQjoXtEKNosOWaZqXgel0g==" crossorigin="anonymous" referrerpolicy="no-referrer" />
	<link rel="stylesheet" href="css/style.css">
</head>
<body>
	<div class="container">
		<header class="header">
			<a href="/index.html" class="logo">Ismail-HASSAN</a>
			<nav class="navbar">
				<a href="/index.html">About</a>
				<a href="/education.html">Education</a>
				<a href="/techno.html">Compétences</a>
				<a href="/portfolio.html">Portfolio</a>
				<a href="/contact.html">Contact</a>
			</nav>
		</header>
		<main id="swup" class="transition-fade">
			<section class="portfolio" id="porfolio">
				<div class="row">
					<div class="image">
						<img src="imgs/contact.jpg" alt="">
					</div>
					<form action="">
						<span>Votre nom</span>
						<input type="text" required placeholder="votre nom" name="name" class="box">
						<span>Votre E-mail</span>
						<input type="email" required placeholder="votre E-mai" name="email" class="box">
						<span>Numero de téléphone</span>
						<input type="number" required placeholder="votre nom" name="number" class="box">
						<textarea name="message" id="message" name="message" required placeholder="votre message" cols="30" rows="10"></textarea>
						<input type="submit" value="Envoyer" class="btn" name="send">
					</form>
				</div>
			</section>
		</main>
	</div>
	<script src="https://unpkg.com/aos@next/dist/aos.js"></script>
	<script>
    AOS.init({

		delay: 300
	});
  </script>
  <script src="https://unpkg.com/swup@latest/dist/swup.min.js"></script> 
  <script src="js/script.js"></script>
</body>
</html>
